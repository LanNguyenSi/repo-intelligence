services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://depsight:depsight@db:5432/depsight
    env_file:
      - path: .env
        required: false
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # depsight.opentriologue.ai
      - "traefik.http.routers.depsight.rule=Host(`depsight.opentriologue.ai`)"
      - "traefik.http.routers.depsight.entrypoints=websecure"
      - "traefik.http.routers.depsight.tls=true"
      - "traefik.http.routers.depsight.tls.certresolver=letsencrypt"
      - "traefik.http.services.depsight.loadbalancer.server.port=3000"
      # ci-insights.opentriologue.ai — same container, second router
      - "traefik.http.routers.ci-insights.rule=Host(`ci-insights.opentriologue.ai`)"
      - "traefik.http.routers.ci-insights.entrypoints=websecure"
      - "traefik.http.routers.ci-insights.tls=true"
      - "traefik.http.routers.ci-insights.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ci-insights.service=depsight"
    networks:
      - traefik-public

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: depsight
      POSTGRES_PASSWORD: depsight
      POSTGRES_DB: depsight
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U depsight"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - traefik-public

volumes:
  postgres_data:

networks:
  traefik-public:
    external: true

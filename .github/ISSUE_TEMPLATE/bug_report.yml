name: Bug report
description: Report a defect in any repo-intelligence sub-package
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Sub-package
      options:
        - ci-insights
        - devreview
        - perf-drift
        - repo-dashboard
        - repo-health
        - other / unsure
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Expected vs. actual behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal commands or input that trigger the bug.
      render: bash
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Sub-package version / commit SHA
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "self-hosted, local dev"
